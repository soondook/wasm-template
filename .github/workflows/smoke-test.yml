name: Pages smoke test

on:
  push:
    branches: [ gh-pages ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check Pages URL returns HTTP 200 (with retries)
        env:
          SITE_URL: "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"
        run: |
          echo "Checking $SITE_URL"
          for i in $(seq 1 30); do
            status=$(curl -s -o /dev/null -w "%{http_code}" -I "$SITE_URL")
            echo "Attempt $i: HTTP $status"
            if [ "$status" -eq 200 ]; then
              echo "Site is up"
              exit 0
            fi
            sleep 10
          done
          echo "Site did not return HTTP 200 after retries"
          exit 1
