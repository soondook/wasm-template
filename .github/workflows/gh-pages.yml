name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '9.0.x'

    - name: Restore
      run: dotnet restore wasm-template.sln

    - name: Publish
      run: dotnet publish wasm-template.sln -c Release -o publish

    - name: Update base href for GitHub Pages
      run: |
        REPO_NAME=${{ github.event.repository.name }}
        INDEX=publish/wwwroot/index.html
        if [ -f "$INDEX" ]; then
          sed -i "s#<base href=\"/\" />#<base href=\"/${REPO_NAME}/\" />#g" "$INDEX" || true
        fi

    - name: Deploy to gh-pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./publish/wwwroot
        destination_branch: gh-pages
        user_name: github-actions[bot]
        user_email: 41898282+github-actions[bot]@users.noreply.github.com
